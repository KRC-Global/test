<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한민국 시도경계 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
        #map { width: 100%; height: 100vh; }

        .info-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: white;
            padding: 16px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            min-width: 200px;
        }
        .info-panel h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }
        .info-panel .province-name {
            font-size: 22px;
            font-weight: 700;
            color: #1a73e8;
        }
        .info-panel .province-eng {
            font-size: 13px;
            color: #888;
            margin-top: 2px;
        }

        .title-panel {
            position: absolute;
            top: 15px;
            left: 55px;
            z-index: 1000;
            background: white;
            padding: 12px 18px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }
        .title-panel h1 {
            font-size: 16px;
            color: #333;
        }

        .legend {
            position: absolute;
            bottom: 25px;
            right: 15px;
            z-index: 1000;
            background: white;
            padding: 14px 18px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            font-size: 12px;
            max-height: 320px;
            overflow-y: auto;
        }
        .legend h4 {
            margin-bottom: 8px;
            color: #333;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            transition: background 0.15s;
        }
        .legend-item:hover { background: #f0f0f0; }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            margin-right: 8px;
            flex-shrink: 0;
            border: 1px solid rgba(0,0,0,0.15);
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background: white;
            padding: 24px 36px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            font-size: 16px;
            color: #333;
        }
        .loading.hidden { display: none; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="title-panel">
        <h1>대한민국 시도경계</h1>
    </div>

    <div class="info-panel" id="infoPanel">
        <h3>시/도 정보</h3>
        <div class="province-name" id="provinceName">지역을 선택하세요</div>
        <div class="province-eng" id="provinceEng"></div>
    </div>

    <div class="legend" id="legend">
        <h4>시도 범례</h4>
    </div>

    <div class="loading" id="loading">지도 데이터를 불러오는 중...</div>

    <script>
        const map = L.map('map', {
            center: [36.0, 127.8],
            zoom: 7,
            zoomControl: true
        });

        // Google Maps 타일 사용
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            attribution: 'Map data &copy; Google',
            maxZoom: 20
        }).addTo(map);

        // 2018년 이후 변경된 이름 매핑
        const NAME_MAP = {
            '전라북도': '전북특별자치도',
            '강원도': '강원특별자치도'
        };

        // 시도경계 스타일: 얇은 경계선 + 회색 투명 음영
        function style(feature) {
            return {
                fillColor: '#999999',
                weight: 1,
                opacity: 0.8,
                color: '#666666',
                fillOpacity: 0.15
            };
        }

        function highlightFeature(e) {
            const layer = e.target;
            layer.setStyle({
                weight: 2,
                color: '#1a73e8',
                fillOpacity: 0.3
            });
            layer.bringToFront();
            // 노선 레이어를 항상 최상단에
            if (routeLayer) routeLayer.bringToFront();

            const props = layer.feature.properties;
            const displayName = NAME_MAP[props.name] || props.name;
            document.getElementById('provinceName').textContent = displayName;
            document.getElementById('provinceEng').textContent = props.name_eng || '';
        }

        function resetHighlight(e) {
            geojsonLayer.resetStyle(e.target);
            document.getElementById('provinceName').textContent = '지역을 선택하세요';
            document.getElementById('provinceEng').textContent = '';
        }

        function zoomToFeature(e) {
            map.fitBounds(e.target.getBounds(), { padding: [30, 30] });
        }

        function onEachFeature(feature, layer) {
            layer.on({
                mouseover: highlightFeature,
                mouseout: resetHighlight,
                click: zoomToFeature
            });

            const displayName = NAME_MAP[feature.properties.name] || feature.properties.name;
            layer.bindTooltip(displayName, {
                permanent: false,
                direction: 'center',
                className: 'province-tooltip'
            });
        }

        let geojsonLayer;
        let routeLayer;

        // 노선 색상 팔레트
        const ROUTE_COLORS = [
            '#e6194b', '#3cb44b', '#4363d8', '#f58231', '#911eb4',
            '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990',
            '#dcbeff', '#9A6324', '#800000', '#aaffc3', '#808000',
            '#000075', '#a9a9a9', '#e6beff', '#ffe119', '#ff6961',
            '#77dd77', '#6b5b95', '#feb236', '#d64161', '#ff7b25',
            '#87ceeb', '#daa520', '#2e8b57'
        ];

        // TopoJSON 데이터 로드 (시도경계)
        const TOPO_URL = 'https://raw.githubusercontent.com/southkorea/southkorea-maps/master/kostat/2013/json/skorea_provinces_topo_simple.json';

        fetch(TOPO_URL)
            .then(res => res.json())
            .then(topoData => {
                const geoData = topojson.feature(topoData, topoData.objects['skorea_provinces_geo']);

                geojsonLayer = L.geoJSON(geoData, {
                    style: style,
                    onEachFeature: onEachFeature
                }).addTo(map);

                // 범례 생성
                const legendEl = document.getElementById('legend');
                geoData.features
                    .sort((a, b) => a.properties.code - b.properties.code)
                    .forEach(f => {
                        const name = f.properties.name;
                        const displayName = NAME_MAP[name] || name;
                        const item = document.createElement('div');
                        item.className = 'legend-item';
                        item.innerHTML = `<div class="legend-color" style="background:#999999; opacity:0.4"></div><span>${displayName}</span>`;
                        item.addEventListener('click', () => {
                            geojsonLayer.eachLayer(layer => {
                                if (layer.feature.properties.name === name) {
                                    map.fitBounds(layer.getBounds(), { padding: [30, 30] });
                                }
                            });
                        });
                        legendEl.appendChild(item);
                    });

                map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });
                document.getElementById('loading').classList.add('hidden');

                // 노선 데이터 로드
                loadRoutes();
            })
            .catch(err => {
                document.getElementById('loading').textContent = '데이터를 불러오지 못했습니다: ' + err.message;
                console.error(err);
            });

        function loadRoutes() {
            const ROUTES_URL = 'https://raw.githubusercontent.com/krc-global/test/main/routes.geojson';

            fetch(ROUTES_URL)
                .then(res => res.json())
                .then(routeData => {
                    routeLayer = L.geoJSON(routeData, {
                        style: function(feature, idx) {
                            const i = routeData.features.indexOf(feature);
                            return {
                                color: ROUTE_COLORS[i % ROUTE_COLORS.length],
                                weight: 3,
                                opacity: 0.9
                            };
                        },
                        onEachFeature: function(feature, layer) {
                            const props = feature.properties;
                            const popupContent = `<b>${props.FAC_NAME || '노선'}</b><br>` +
                                (props.DISTRIC_01 ? `위치: ${props.DISTRIC_01}<br>` : '') +
                                (props.OWNER_TYPE ? `소유: ${props.OWNER_TYPE}<br>` : '') +
                                (props.CHECK_DATE ? `점검일: ${props.CHECK_DATE}` : '');
                            layer.bindPopup(popupContent);
                            layer.bindTooltip(props.FAC_NAME || '노선', {
                                permanent: false,
                                direction: 'top',
                                offset: [0, -5]
                            });
                        }
                    }).addTo(map);

                    // 노선 범례 추가
                    const legendEl = document.getElementById('legend');
                    const separator = document.createElement('div');
                    separator.innerHTML = '<hr style="margin:8px 0; border:none; border-top:1px solid #ddd;"><h4 style="margin-bottom:6px;">개보수 용수로 노선</h4>';
                    legendEl.appendChild(separator);

                    routeData.features.forEach((f, i) => {
                        const item = document.createElement('div');
                        item.className = 'legend-item';
                        item.innerHTML = `<div class="legend-color" style="background:${ROUTE_COLORS[i % ROUTE_COLORS.length]}; height:4px; border-radius:2px; margin-top:6px;"></div><span style="font-size:11px;">${f.properties.FAC_NAME || '노선'}</span>`;
                        item.addEventListener('click', () => {
                            routeLayer.eachLayer(layer => {
                                if (layer.feature === f) {
                                    map.fitBounds(layer.getBounds(), { padding: [50, 50] });
                                    layer.openPopup();
                                }
                            });
                        });
                        legendEl.appendChild(item);
                    });
                })
                .catch(err => {
                    console.error('노선 데이터 로드 실패:', err);
                });
        }
    </script>
</body>
</html>
